# ═══════════════════════════════════════════════════════════════════
#  Преднастройка Spark для работы со стеком.
#  Монтируется в контейнер Jupyter, чтобы не прописывать это
#  в каждом ноутбуке вручную.
#
#  Здесь:
#   - пакеты для S3A (доступ к MinIO) и JDBC (Postgres), Kafka
#   - параметры подключения к MinIO как к S3-хранилищу
# ═══════════════════════════════════════════════════════════════════

# --- Пакеты (скачиваются с Maven при первом запуске сессии) ---
# hadoop-aws + aws-sdk  -> доступ к MinIO по протоколу s3a://
# postgresql            -> JDBC-драйвер для Postgres
# spark-sql-kafka       -> чтение/запись Kafka из Structured Streaming
spark.jars.packages    org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.postgresql:postgresql:42.7.3,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0

# --- MinIO как S3-хранилище (протокол s3a://) ---
spark.hadoop.fs.s3a.endpoint                 http://minio:9000
spark.hadoop.fs.s3a.access.key               minioadmin
spark.hadoop.fs.s3a.secret.key               minioadmin
spark.hadoop.fs.s3a.path.style.access        true
spark.hadoop.fs.s3a.impl                     org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled   false

# --- Разумные дефолты для локальной разработки ---
spark.sql.shuffle.partitions                 8
spark.sql.adaptive.enabled                   true

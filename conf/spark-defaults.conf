# ═══════════════════════════════════════════════════════════════════
#  Преднастройка Spark для работы со стеком.
#  Монтируется в контейнер Jupyter — не нужно прописывать в каждом ноутбуке.
#
#  Пакеты для: S3A (MinIO), Kafka (стриминг), Delta Lake (lakehouse),
#              ClickHouse (витрины gold)
#
#  ⚠️ ВЕРСИИ DELTA И SPARK СВЯЗАНЫ:
#     Delta 3.3.x  ←→  Spark 3.5.3
#     Delta 3.2.0  ←→  Spark 3.5.2
#  Если первый запуск падает на Delta — проверьте spark.version в ноутбуке
#  и подберите delta-spark по матрице на docs.delta.io/releases
# ═══════════════════════════════════════════════════════════════════

# --- Пакеты (скачиваются с Maven при первом запуске сессии) ---
# hadoop-aws + aws-sdk    -> доступ к MinIO по протоколу s3a://
# spark-sql-kafka         -> чтение/запись Kafka (Structured Streaming)
# delta-spark             -> Delta Lake: ACID, MERGE (SCD2), time travel
# clickhouse-jdbc         -> запись витрин gold в ClickHouse
spark.jars.packages    org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,io.delta:delta-spark_2.12:3.3.0,com.clickhouse:clickhouse-jdbc:0.6.5

# --- Delta Lake: подключение расширений и каталога ---
spark.sql.extensions                         io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog              org.apache.spark.sql.delta.catalog.DeltaCatalog

# --- MinIO как S3-озеро (протокол s3a://) ---
spark.hadoop.fs.s3a.endpoint                 http://minio:9000
spark.hadoop.fs.s3a.access.key               minioadmin
spark.hadoop.fs.s3a.secret.key               minioadmin
spark.hadoop.fs.s3a.path.style.access        true
spark.hadoop.fs.s3a.impl                     org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled   false

# --- Разумные дефолты для локальной разработки ---
spark.sql.shuffle.partitions                 8
spark.sql.adaptive.enabled                   true
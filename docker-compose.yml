# ═══════════════════════════════════════════════════════════════════
#  Fintech PySpark — единый стек для пет-проекта
#  Сервисы: Postgres (OLTP) · MinIO (S3-хранилище) · Kafka (стриминг)
#           Jupyter+Spark (рабочая среда)
#
#  Все образы multi-arch — работают и на Apple Silicon (ARM64), и на amd64.
#  Внутри сети сервисы доступны по ИМЕНИ (postgres, minio, kafka),
#  с хоста — по localhost через проброшенные порты.
#
#  Запуск:   docker compose up -d
#  Логи:     docker compose logs -f jupyter
#  Стоп:     docker compose down          (данные сохраняются в volumes)
#  Снести всё: docker compose down -v     (вместе с данными)
# ═══════════════════════════════════════════════════════════════════

services:

  # ─── Postgres: источник OLTP-данных и витринная БД для BI ───
  postgres:
    image: postgres:16
    container_name: ftp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spark}
      POSTGRES_DB: ${POSTGRES_DB:-fintech}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spark} -d ${POSTGRES_DB:-fintech}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ftp-net

  # ─── MinIO: S3-совместимое объектное хранилище (медальон bronze/silver/gold) ───
  minio:
    image: minio/minio:latest
    container_name: ftp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # веб-консоль
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ftp-net

  # ─── MinIO init: создаёт бакеты bronze/silver/gold при старте и выходит ───
  minio-init:
    image: minio/mc:latest
    container_name: ftp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      echo 'Бакеты bronze/silver/gold готовы';
      exit 0;
      "
    networks:
      - ftp-net

  # ─── Kafka: стриминг событий (KRaft mode, без Zookeeper) ───
  kafka:
    image: apache/kafka:3.9.0
    container_name: ftp-kafka
    ports:
      - "9092:9092"   # доступ с хоста (localhost:9092)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      # Три листенера: внутренний (для контейнеров), контроллер (KRaft), хостовый
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ftp-net

  # ─── Jupyter + Spark: основная рабочая среда ───
  jupyter:
    image: quay.io/jupyter/pyspark-notebook:latest
    container_name: ftp-jupyter
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8888:8888"   # JupyterLab
      - "4040:4040"   # Spark UI
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-spark}
      # Параметры подключения к сервисам — читаются в ноутбуках
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-spark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spark}
      POSTGRES_DB: ${POSTGRES_DB:-fintech}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      KAFKA_BOOTSTRAP: kafka:19092
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./jars:/home/jovyan/jars
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf
    networks:
      - ftp-net

volumes:
  postgres-data:
  minio-data:

networks:
  ftp-net:
    driver: bridge

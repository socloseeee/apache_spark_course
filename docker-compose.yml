# ═══════════════════════════════════════════════════════════════════
#  Apache Spark Course — единый стек для пет-проекта
#  Сервисы: MinIO (S3-озеро) · Kafka (стриминг) · ClickHouse (витрины)
#           Metabase (BI-дашборды) · Jupyter+Spark (рабочая среда)
#
#  Поток данных:
#    источники (генератор) -> bronze (MinIO) и Kafka
#    Spark: bronze -> silver -> gold
#    gold -> ClickHouse -> Metabase (дашборды по URL)
#
#  Все образы multi-arch — работают на Apple Silicon (ARM64) и amd64.
#  Внутри сети сервисы доступны по ИМЕНИ (minio, kafka, clickhouse),
#  с хоста — по localhost через проброшенные порты.
#
#  Запуск:   docker compose up -d
#  Стоп:     docker compose down          (данные сохраняются в volumes)
# ═══════════════════════════════════════════════════════════════════

services:

  # ─── MinIO: S3-совместимое озеро (слои bronze/silver/gold) ───
  minio:
    image: minio/minio:latest
    container_name: asc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # веб-консоль
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asc-net

  # ─── MinIO init: создаёт бакеты bronze/silver/gold и выходит ───
  minio-init:
    image: minio/mc:latest
    container_name: asc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      echo 'Бакеты bronze/silver/gold готовы';
      exit 0;
      "
    networks:
      - asc-net

  # ─── Kafka: стриминг событий (KRaft mode, без Zookeeper) ───
  kafka:
    image: apache/kafka:3.9.0
    container_name: asc-kafka
    ports:
      - "9092:9092"   # доступ с хоста (localhost:9092)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - asc-net

  # ─── ClickHouse: аналитическое хранилище витрин (gold) ───
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: asc-clickhouse
    ports:
      - "8123:8123"   # HTTP-интерфейс (Metabase, отладка)
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-spark}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-spark}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-gold}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asc-net

  # ─── Metabase: BI-дашборды (ClickHouse-драйвер встроен с v54+) ───
  metabase:
    image: metabase/metabase:latest
    container_name: asc-metabase
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"   # веб-интерфейс дашбордов
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
    networks:
      - asc-net

  # ─── Jupyter + Spark: основная рабочая среда ───
  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.3
    container_name: asc-jupyter
    depends_on:
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "8888:8888"   # JupyterLab
      - "4040:4040"   # Spark UI
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-spark}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      KAFKA_BOOTSTRAP: kafka:19092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-spark}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-spark}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-gold}
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data-generator:/home/jovyan/data-generator
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf
    networks:
      - asc-net

volumes:
  minio-data:
  clickhouse-data:
  metabase-data:

networks:
  asc-net:
    driver: bridge